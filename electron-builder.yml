appId: com.bbre.anomalie
productName: BBRE Anomalie Bancarie
executableName: bbre-anomalie

directories:
  output: dist

files:
  - src/**/*
  - package.json
  - data/**/*
  - node_modules/**/*

win:
  target:
    - target: nsis
      arch: [x64]
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BBRE Anomalie Bancarie

asar: true
asarUnpack:
  - node_modules/sql.js/**/*
  - node_modules/pdf-parse/**/*

publish:
  provider: github
  owner: Beppe225
  repo: BBRE-Anomalie-Bancarie
  private: false
  releaseType: release
